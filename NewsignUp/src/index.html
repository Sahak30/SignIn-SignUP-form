<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- link font icon in our website-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="aside">
        <a href="#"><img src="images/logo2.png" class="logo" alt="logo" /></a>

          This login section is intended for users who already have an existing
          account.
        </p>
        <button class="asid-btn">Learm more..</button>
      </div>

        <form action="">
          <h2>Sign in</h2>
          <label for="">Username</label>
          <input type="text" placeholder="Username" required />
          <label for="">password</label>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <a href="signup.html" class="signUpText">Don't have account</a>
        <div class="social-icons">
          <a href="https://facebook.com/" target="_blank">
            <i class="fab fa-facebook"></i>
          </a>
          <a href="https://instagram.com/" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://twitter.com/" target="_blank">
            <i class="fab fa-x-twitter"></i>
          </a>
          <a href="https://whatsapp.com/" target="_blank">

          </a>
        </div>
      </div>
    </div>
  </body>
</html>
