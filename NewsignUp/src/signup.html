<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- link font icon in our website-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="aside">
        <a href="#"><img src="images/logo2.png" class="logo" alt="logo" /></a>
        <h1>Welcome!</h1>
        <p>
          This sign-up form is for users who do not yet have an account and
          would like to create one on our website.
        </p>
        <button class="asid-btn">Learm more..</button>
      </div>
      <div class="lognin" style="height: 410px">
        <form action="">
          <h2>Sign UP</h2>
          <label for="">Username</label>
          <input type="text" placeholder="Username" required />
          <label for="">Password</label>
          <input type="password" placeholder="password" required />
          <label for="">Confirm password</label>
          <input type="password" placeholder="Confirm password" required />
          <button type="submit" class="submit-btn">Sign Up</button>
        </form>
        <a href="index.html" class="signUpText">Alrady have account</a>
        <div class="social-icons">
          <a href="https://facebook.com/yourpage" target="_blank">
            <i class="fab fa-facebook"></i>
          </a>
          <a href="https://instagram.com/yourpage" target="_blank">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="https://twitter.com/yourpage" target="_blank">
            <i class="fab fa-x-twitter"></i>
          </a>
          <a href="https://whatsapp.com/yourpage" target="_blank">
            <i class="fab fa-whatsapp"></i>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
